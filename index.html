<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Iqra ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
color:rgb(128, 32, 40);
}

h1{
margin-top:60px;
font-size:32px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:white;
color:#ff4d6d;
}

img{
width:80%;
max-width:350px;
height:auto;
border-radius:15px;
margin-top:20px;
box-shadow:0px 0px 20px rgba(0,0,0,0.3);
}

.text{
margin-top:0px;
font-size:18px;
padding:10px;
}

#slideshow{
display:none;
}

#eidPage{
display:none;
font-size:28px;
margin-top:120px;
animation:fadeIn 2s ease-in-out;
}

@keyframes fadeIn{
0%{opacity:0; transform:scale(0.8);}
100%{opacity:1; transform:scale(1);}
}

</style>

</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<div id="front">

<h1>🎂 Happy Birthday Iqra 🎂</h1>

<p>Today is your special day 💖</p>

<button onclick="startShow()">Start Memories</button>

</div>

<div id="slideshow">

<img id="slide" src="pic1.jpeg">

<div class="text" id="caption"></div>

</div>

<div id="eidPage">

<h1>🌙 Eid Mubarak Iqra 🌙</h1>

<p>Allah tumhari life khushiyon se bhar de 🤲</p>

<p>May your Eid be full of smiles and blessings ✨</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

let images=[
"pic1.jpeg",
"pic2.jpeg",
"pic3.jpeg",
"pic4.jpeg",
"pic5.jpeg",
"pic6.jpeg",
"pic7.jpeg",
"pic8.jpeg",
"pic9.jpeg",
"pic10.jpeg"
];

let captions=[

"🎂 Happy Birthday Iqra! <br> Allah tumhe hamesha khush rakhe 💖",

"🎉 Aaj ka din sirf tumhara hai <br> Enjoy your special day 🎂",

"🥳 Tumhari life khushiyon se bhari rahe <br> Happy Birthday bestie 💕",

"🎂 Har saal tumhari smile aur bright ho <br> Stay blessed always ✨",

"🌟 May all your dreams come true <br> Happy Birthday Iqra 🎉",

"🌙 Eid Mubarak Iqra <br> Allah tumhari har dua qabool kare 🤲",

"🌙 Eid ki khushiyan tumhari life me hamesha rahein <br> Eid Mubarak 💫",

"🌙 Tumhari Eid hamesha pyari aur joyful ho <br> Lots of prayers for you 🤍",


"💖 Iqra tum meri bestie ho <br> Tumhari dosti bohat special hai",

"❤️ Tum jaisi best friend sab ko nahi milti <br> I'm lucky to have you 🤗"
];

let i=0;
let eidShown=false;

function startShow(){

document.getElementById("front").style.display="none";
document.getElementById("slideshow").style.display="block";

document.getElementById("music").play();

confetti({
particleCount:200,
spread:120
});

setInterval(slideshow,3000);

}

function slideshow(){

if(i==5 && !eidShown){

eidShown=true;

document.getElementById("slideshow").style.display="none";
document.getElementById("eidPage").style.display="block";

setTimeout(function(){

document.getElementById("eidPage").style.display="none";
document.getElementById("slideshow").style.display="block";

},4000);

}

document.getElementById("slide").src=images[i];
document.getElementById("caption").innerHTML=captions[i];

i++;

if(i>=images.length){
i=0;
}

}

</script>

</body>
</html>
